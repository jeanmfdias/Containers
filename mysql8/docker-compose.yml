services:
  db8:
    container_name: mysql84-containers
    image: mysql84-containers
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "3380:3306"
    volumes:
      - mysql8_data:/var/lib/mysql
      - ./configs/db8.cnf:/etc/mysql/conf.d/db8.cnf
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=secret
    restart: unless-stopped

volumes:
  mysql8_data:
    driver: local